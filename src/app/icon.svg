<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="150" y1="90" x2="355" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C74D6"/>
      <stop offset="55%" stop-color="#0A57C6"/>
      <stop offset="100%" stop-color="#27C3D9"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="205" y1="130" x2="330" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B3E96"/>
      <stop offset="100%" stop-color="#0A6AD2"/>
