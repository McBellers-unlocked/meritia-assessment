<ellipse cx="276.9" cy="136.5" rx="7.3" ry="13.2" transform="rotate(-172.0 276.9 136.5)" fill="url(#leafGrad)" opacity="0.72" />
<ellipse cx="242.9" cy="135.6" rx="6.6" ry="12.0" transform="rotate(-185.0 242.9 135.6)" fill="url(#leafGrad)" opacity="0.67" />
    <path d="M216 380C229 392 243 398 256 398C269 398 283 392 296 380" stroke="#1BAED9" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
